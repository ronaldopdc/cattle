<script>
    let currentMemoryId = null;

    function getSummarizedLiquidations(liquidations) {
        const groups = new Map();

        (liquidations || []).forEach((liq, index) => {
            const groupKey = liq.created_at ? `${liq.date}|${liq.created_at}` : `id:${liq.id}`;
            if (!groups.has(groupKey)) {
                groups.set(groupKey, {
                    ...liq,
                    amount_principal: 0,
                    amount_interest: 0,
                    amount_total: 0,
                    balance_after: 0,
                    quantity: 0,
                    estimated_quantity: 0,
                    lot_number: '',
                    group_ids: [],
                    group_count: 0,
                    _firstIndex: index,
                    _lotNumbers: new Set(),
                    _quantityParts: [],
                    _explicitQuantity: 0,
                    _estimatedQuantity: 0,
                    _hasExplicitQuantity: false,
                    _hasEstimatedQuantity: false,
                    _weightedRateAmount: 0,
                    _weightedRatePrincipal: 0,
                    _lastSortId: 0
                });
            }

            const summary = groups.get(groupKey);
            const principal = parseFloat(liq.amount_principal || 0);
            const interest = parseFloat(liq.amount_interest || 0);
            const total = parseFloat(liq.amount_total || 0);
            const rate = parseFloat(liq.rate || 0);
            const id = parseInt(liq.id || 0);

            summary.amount_principal += principal;
            summary.amount_interest += interest;
            summary.amount_total += total;
            summary.group_ids.push(liq.id);
            summary.group_count += 1;

            if (principal > 0) {
                summary._weightedRateAmount += rate * principal;
                summary._weightedRatePrincipal += principal;
            }

            if (liq.lot_number) {
                summary._lotNumbers.add(String(liq.lot_number));
            }

            const explicitQuantity = parseInt(liq.quantity || 0);
            const estimatedQuantity = parseInt(liq.estimated_quantity || 0);
            if (explicitQuantity > 0) {
                summary._hasExplicitQuantity = true;
                summary._explicitQuantity += explicitQuantity;
                summary._quantityParts.push(String(explicitQuantity));
            } else if (estimatedQuantity > 0) {
                summary._hasEstimatedQuantity = true;
                summary._estimatedQuantity += estimatedQuantity;
                summary._quantityParts.push(`~${estimatedQuantity}`);
            }

            if (id >= summary._lastSortId) {
                summary._lastSortId = id;
                summary.id = liq.id;
                summary.balance_after = parseFloat(liq.balance_after || 0);
                summary.is_settlement = liq.is_settlement;
            }
        });

        return Array.from(groups.values())
            .sort((a, b) => a._firstIndex - b._firstIndex)
            .map(summary => {
                summary.rate = summary._weightedRatePrincipal > 0
                    ? (summary._weightedRateAmount / summary._weightedRatePrincipal)
                    : parseFloat(summary.rate || 0);
                summary.lot_number = Array.from(summary._lotNumbers).join(', ');

                if (summary._hasExplicitQuantity) {
                    summary.quantity = summary._explicitQuantity + summary._estimatedQuantity;
                    summary.quantity_display = summary._quantityParts.join(', ');
                    summary.estimated_quantity = 0;
                    summary.quantity_is_estimated = false;
                } else if (summary._hasEstimatedQuantity) {
                    summary.quantity = 0;
                    summary.estimated_quantity = summary._estimatedQuantity;
                    summary.quantity_display = summary._quantityParts.join(', ');
                    summary.quantity_is_estimated = true;
                }

                delete summary._lotNumbers;
                delete summary._quantityParts;
                delete summary._explicitQuantity;
                delete summary._estimatedQuantity;
                delete summary._hasExplicitQuantity;
                delete summary._hasEstimatedQuantity;
                delete summary._weightedRateAmount;
                delete summary._weightedRatePrincipal;
                delete summary._lastSortId;
                delete summary._firstIndex;

                return summary;
            });
    }

    function formatLotDisplay(lotNumber) {
        if (!lotNumber) return '-';
        return String(lotNumber)
            .split(',')
            .map(lot => lot.trim())
            .filter(Boolean)
            .map(lot => `#${lot}`)
            .join(', ');
    }

    async function deleteLiquidationGroup(ids) {
        const groupIds = Array.isArray(ids) ? ids.filter(Boolean) : [ids];
        if (groupIds.length === 0) return;

        const message = groupIds.length > 1
            ? 'Tem certeza que deseja excluir esta liquidação sumarizada? Todas as linhas vinculadas serão removidas.'
            : 'Tem certeza que deseja excluir esta liquidação?';
        if (!confirm(message)) {
            return;
        }

        try {
            for (const id of groupIds) {
                const response = await fetch(`partnerships.php?action=delete_liquidation&id=${id}`);
                const result = await response.json();
                if (!result.success) {
                    alert('Erro ao excluir: ' + result.message);
                    return;
                }
            }
            window.location.reload();
        } catch (error) {
            console.error('Error:', error);
            alert('Erro ao excluir liquidação');
        }
    }

    function openMemoryModal(id) {
        currentMemoryId = id;
        const memory = partnershipMemories[id];
        if (!memory) return;

        const modal = document.getElementById('memoryModal');
        const body = document.getElementById('memoryModalBody');
        document.getElementById('memory-partnership-id').innerText = memory.partnership_id;

        // Parse date manually (UTC to avoid timezone shifts on display)
        const dateParts = memory.start_date.split('-');
        const startDate = new Date(Date.UTC(dateParts[0], dateParts[1] - 1, dateParts[2]));
        // Note: For display we use UTC components
        const startDay = String(startDate.getUTCDate()).padStart(2, '0');
        const startMonth = String(startDate.getUTCMonth() + 1).padStart(2, '0');
        const startYear = startDate.getUTCFullYear();

        let hasQuantityLiquidations = false;
        let hasLotInLiquidations = false;
        const summarizedLiquidations = getSummarizedLiquidations(memory.liquidations || []);
        if (memory.liquidations) {
            hasQuantityLiquidations = summarizedLiquidations.some(liq => liq.quantity || parseInt(liq.estimated_quantity) > 0);
            hasLotInLiquidations = summarizedLiquidations.some(liq => liq.lot_number);
        }
        // Always show cattle tiles next to "Taxa de Engorda Média" when the partnership tracks cattle count
        const hasCattleData = parseInt(memory.initial_cattle_count || 0) > 0;
        let gridCols = hasCattleData ? '1fr 1fr 1fr 1fr' : '1fr 1fr';

        let html = `
            <div style="margin-bottom: 1.5rem;">
                <p style="margin: 0.5rem 0;"><strong style="color: #cbd5e1;">Proprietário:</strong> ${memory.owner_name}</p>
                <p style="margin: 0.5rem 0;"><strong style="color: #cbd5e1;">Investidor:</strong> ${memory.investor_name}</p>
                <p style="margin: 0.5rem 0;"><strong style="color: #cbd5e1;">Data Início:</strong> ${startDay}/${startMonth}/${startYear}</p>
            </div>

            <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; margin-bottom: 1rem;">
                    <h3 style="margin: 0; color: #e2e8f0; font-size: 1.1rem;">Demonstrativo Consolidado</h3>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <label style="color: #94a3b8; font-size: 0.9rem;">Data de Cálculo:</label>
                        <input type="date" id="calculationDate" 
                               value="" 
                               onchange="recalculateMemory()"
                               style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px; border-radius: 4px;">
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: ${gridCols}; gap: 1rem; margin-top: 1rem;">
                    <div>
                        <p style="margin: 0.5rem 0; color: #94a3b8; font-size: 0.9rem;">Tempo de Engorda Decorrido</p>
                        <div id="mem-time-elapsed" style="font-size: 1.2rem; font-weight: 500; color: #e2e8f0;">-</div>
                    </div>
                    <div>
                        <p style="margin: 0.5rem 0; color: #94a3b8; font-size: 0.9rem;">Taxa de Engorda Média</p>
                        <div id="mem-weighted-rate" style="font-size: 1.2rem; font-weight: 500; color: #e2e8f0;">-</div>
                    </div>
                    ${hasCattleData ? `
                    <div>
                        <p style="margin: 0.5rem 0; color: #94a3b8; font-size: 0.9rem;">Total de Cabeças</p>
                        <div id="mem-initial-cattle" style="font-size: 1.2rem; font-weight: 500; color: #e2e8f0;">-</div>
                    </div>
                    <div>
                        <p style="margin: 0.5rem 0; color: #94a3b8; font-size: 0.9rem;">Saldo Atual de Cabeças</p>
                        <div id="mem-remaining-cattle" style="font-size: 1.2rem; font-weight: 500; color: #60a5fa;">-</div>
                    </div>
                    ` : ''}
                </div>

                <div style="margin-top: 1.5rem;">
                    <table style="width: 100%; font-size: 1rem; border-collapse: collapse;">
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.75rem 0; color: #cbd5e1; width: 70%;">Principal Inicial Total</td>
                            <td style="text-align: right; color: #e2e8f0; width: 30%;">${formatCurrency(memory.total_initial_principal)}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.75rem 0; color: #cbd5e1;">(+) Valor de Engorda/Valorização Acumulada</td>
                            <td id="mem-total-interest" style="text-align: right; color: #10b981;">-</td>
                        </tr>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02);">
                            <td style="padding: 0.75rem 0; color: #e2e8f0;"><strong>(=) Valor Bruto Atual</strong></td>
                            <td id="mem-current-value" style="text-align: right; color: #e2e8f0; font-weight: bold;">-</td>
                        </tr>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 0.75rem 0; color: #cbd5e1;">(-) Total Abatido (Principal + Acumulado)</td>
                            <td id="mem-total-liquidated" style="text-align: right; color: #ef4444;">-</td>
                        </tr>
                        <tr>
                            <td style="padding: 0.75rem 0; font-size: 1.1rem; color: #e2e8f0;"><strong>(=) Saldo Atual (Ativos)</strong></td>
                            <td id="mem-current-balance" style="text-align: right; font-size: 1.1rem; color: #60a5fa; font-weight: bold;">-</td>
                        </tr>
                    </table>
                </div>
            </div>
        `;

        if (summarizedLiquidations.length > 0) {
            html += `
                <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 8px;">
                    <h3 style="margin-top: 0; color: #fbbf24; font-size: 1.1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">Histórico de Liquidações</h3>
                    <div style="overflow-x: auto; margin-top: 1rem;">
                        <table style="width: 100%; font-size: 0.9rem; border-collapse: collapse;">
                            <thead>
                                <tr style="background: rgba(255, 255, 255, 0.05);">
                                    <th style="padding: 8px; text-align: left; color: #cbd5e1; font-weight: 500; width: 10%;">Data</th>
                                    <th style="padding: 8px; text-align: center; color: #cbd5e1; font-weight: 500; width: 9%;">Tempo</th>
                                    <th style="padding: 8px; text-align: center; color: #cbd5e1; font-weight: 500; width: 8%;" title="Lote vinculado à liquidação">Lote</th>
                                    <th style="padding: 8px; text-align: center; color: #cbd5e1; font-weight: 500; width: 7%;" title="Cabeças abatidas">Cab.</th>
                                    <th style="padding: 8px; text-align: right; color: #cbd5e1; font-weight: 500; width: 8%;">Taxa</th>
                                    <th style="padding: 8px; text-align: right; color: #cbd5e1; font-weight: 500; width: 13%;">Principal</th>
                                    <th style="padding: 8px; text-align: right; color: #cbd5e1; font-weight: 500; width: 12%;">Valor da Engorda</th>
                                    <th style="padding: 8px; text-align: right; color: #cbd5e1; font-weight: 500; width: 12%;">Total</th>
                                    <th style="padding: 8px; text-align: right; color: #cbd5e1; font-weight: 500; width: 13%;">Saldo Após</th>
                                    <th style="padding: 8px; text-align: center; color: #cbd5e1; font-weight: 500; width: 8%;">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
            `;

            let effectiveRateContract = null;
            let hasSettlementLiq = false;
            let lastEventDateGlobal = memory.start_date;
            if (memory.events && memory.events.length > 0) {
                for (let event of memory.events) {
                    if (event.balance_after < 0.01) {
                        hasSettlementLiq = true;
                        lastEventDateGlobal = event.date;
                        break;
                    }
                }
            }

            if (hasSettlementLiq && summarizedLiquidations.length > 0) {
                let initialPrincipal = parseFloat(memory.total_initial_principal);
                let totalPaid = parseFloat(memory.total_liquidated_amount);
                
                const dp = lastEventDateGlobal.split('-');
                const sDateObj = new Date(Date.UTC(dp[0], dp[1] - 1, dp[2]));
                const sp = memory.start_date.split('-');
                const startObj = new Date(Date.UTC(sp[0], sp[1] - 1, sp[2]));
                
                const diffTimeSettled = sDateObj - startObj;
                const displayDaysSettled = Math.max(0, Math.ceil(diffTimeSettled / (1000 * 60 * 60 * 24)));
                const preciseMonths = displayDaysSettled / 30;
                
                // NOTA: A taxa efetiva não pode ser calculada fiavelmente para n>1 liquidações através de pow(). 
                // A taxa original contratada deve ser mantida visualmente.
            }

            let lastLiqDateStr = memory.start_date;

            summarizedLiquidations.forEach(liq => {
                const dateParts = liq.date.split('-');
                const liqDate = new Date(Date.UTC(dateParts[0], dateParts[1] - 1, dateParts[2]));
                const d = String(liqDate.getUTCDate()).padStart(2, '0');
                const m = String(liqDate.getUTCMonth() + 1).padStart(2, '0');
                const y = liqDate.getUTCFullYear();

                // Calculate time since last event
                const lastParts = lastLiqDateStr.split('-');
                const lastDate = new Date(Date.UTC(lastParts[0], lastParts[1] - 1, lastParts[2]));
                const diffTime = liqDate - lastDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const elapsedMonths = (diffDays / 30).toFixed(1);
                const displayElapsed = `${elapsedMonths}m (${diffDays}d)`;

                let displayRate = parseFloat(liq.rate);
                let displayLot = formatLotDisplay(liq.lot_number);

                // Head count: explicit quantity, otherwise backend estimate (flagged with ~)
                let displayQuantity = '-';
                if (liq.quantity) {
                    displayQuantity = liq.quantity_display || liq.quantity;
                } else if (parseInt(liq.estimated_quantity) > 0) {
                    displayQuantity = liq.quantity_display || `<span title="Estimativa por valor de principal">~${parseInt(liq.estimated_quantity)}</span>`;
                }

                html += `
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <td style="padding: 8px; color: #e2e8f0;">${d}/${m}/${y}</td>
                        <td style="padding: 8px; text-align: center; color: #94a3b8; font-size: 0.85rem;" title="${diffDays} dias desde o evento anterior">${displayElapsed}</td>
                        <td style="padding: 8px; text-align: center; color: #fbbf24; font-weight: 500;" title="Lote vinculado">${displayLot}</td>
                        <td style="padding: 8px; text-align: center; color: #e2e8f0;" title="Cabeças abatidas">${displayQuantity}</td>
                        <td style="padding: 8px; text-align: right; color: #e2e8f0;">${displayRate.toFixed(2)}%</td>
                        <td style="padding: 8px; text-align: right; color: #e2e8f0;">${formatCurrency(liq.amount_principal)}</td>
                        <td style="padding: 8px; text-align: right; color: #e2e8f0;">${formatCurrency(liq.amount_interest)}</td>
                        <td style="padding: 8px; text-align: right; font-weight: 500; color: #e2e8f0;">${formatCurrency(liq.amount_total)}</td>
                        <td style="padding: 8px; text-align: right; font-weight: 500; color: #818cf8;">${formatCurrency(liq.balance_after || 0)}</td>
                        <td style="padding: 8px; text-align: center;">
                            <div style="display: flex; justify-content: center; gap: 4px;">
                                <button onclick='generateReceipt(${JSON.stringify(liq)}, ${JSON.stringify(memory)})' 
                                         style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #10b981; cursor: pointer; padding: 4px 8px; border-radius: 4px;"
                                         title="Gerar Recibo">
                                    <i class="fas fa-file-invoice"></i>
                                </button>
                                ${memory.has_edit_permission ? `
                                <button onclick='deleteLiquidationGroup(${JSON.stringify(liq.group_ids || [liq.id])})'
                                         style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; cursor: pointer; padding: 4px 8px; border-radius: 4px;"
                                          title="Excluir Liquidação${(liq.group_count || 1) > 1 ? ' Sumarizada' : ''}">
                                    <i class="fas fa-trash"></i>
                                </button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;

                lastLiqDateStr = liq.date;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        body.innerHTML = html;
        modal.style.display = 'block';

        // Set default calculation date to today in local timezone
        // Create today's date in Brasilia timezone
        const todayStr = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'America/Sao_Paulo',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).format(new Date());
        let defaultCalculationDate = todayStr;
        if (memory.liquidations && memory.liquidations.length > 0) {
            summarizedLiquidations.forEach(liq => {
                const isSettlement = parseInt(liq.is_settlement || 0) === 1 || parseFloat(liq.balance_after || 0) <= 0.05;
                if (liq.date > defaultCalculationDate) {
                    defaultCalculationDate = liq.date;
                }
            });
        }
        document.getElementById('calculationDate').value = defaultCalculationDate;

        // Trigger initial calculation
        recalculateMemory();
    }

    function recalculateMemory() {
        const memory = partnershipMemories[currentMemoryId];
        if (!memory) return;

        const dateInput = document.getElementById('calculationDate').value;
        const targetDateStr = dateInput; // yyyy-mm-dd

        const startParts = memory.start_date.split('-');
        const startDate = new Date(Date.UTC(startParts[0], startParts[1] - 1, startParts[2]));

        const dParts = targetDateStr.split('-');
        const targetDate = new Date(Date.UTC(dParts[0], dParts[1] - 1, dParts[2]));

        // Calculate time elapsed
        const diffTime = targetDate - startDate;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const displayDays = diffDays > 0 ? diffDays : 0;
        const diffMonths = (displayDays / 30).toFixed(1);

        document.getElementById('mem-time-elapsed').innerHTML = `${diffMonths} meses <span style="font-size: 0.9rem; color: #64748b;">(${displayDays} dias)</span>`;

        // --- Event-Based Rolling Calculation ---
        // Use the backend-calculated events to properly track balance and interest
        const events = memory.events || [];

        let currentBalance = parseFloat(memory.total_initial_principal);
        let totalInterestAccrued = 0;
        let lastEventDate = memory.start_date;

        // Process all events up to the calculation date
        for (let event of events) {
            const eventDateParts = event.date.split('-');
            const eventDate = new Date(Date.UTC(eventDateParts[0], eventDateParts[1] - 1, eventDateParts[2]));

            if (eventDate > targetDate) {
                break; // Stop processing events after target date
            }

            // Add interest accrued in this event
            totalInterestAccrued += parseFloat(event.interest_accrued || 0);

            // Update current balance
            currentBalance = parseFloat(event.balance_after);
            lastEventDate = event.date;
        }

        // If calculation date is after the last event, calculate additional accrual
        const lastParts = lastEventDate.split('-');
        const lastDate = new Date(Date.UTC(lastParts[0], lastParts[1] - 1, lastParts[2]));

        if (targetDate > lastDate) {
            // Need to calculate interest from last event to target date
            const additionalDiff = targetDate - lastDate;
            const additionalDays = Math.ceil(additionalDiff / (1000 * 60 * 60 * 24));

            if (additionalDays > 0) {
                // Get current rate (furthest lot logic)
                let currentRate = 0;
                let sortedLots = [...memory.lots];
                sortedLots.sort((a, b) => new Date(a.slaughter_date) - new Date(b.slaughter_date));

                for (let l of sortedLots) {
                    if (l.slaughter_date) {
                        const sParts = l.slaughter_date.split('-');
                        const sDate = new Date(Date.UTC(sParts[0], sParts[1] - 1, sParts[2]));
                        if (sDate >= targetDate) {
                            currentRate = parseFloat(l.rate);
                            break;
                        }
                    }
                }
                if (currentRate === 0 && sortedLots.length > 0) {
                    currentRate = parseFloat(sortedLots[sortedLots.length - 1].rate);
                }

                // Calculate additional interest using compound formula
                const additionalMonths = additionalDays / 30;
                const factor = Math.pow((1 + currentRate / 100), additionalMonths);
                const newBalance = currentBalance * factor;
                const additionalInterest = newBalance - currentBalance;

                totalInterestAccrued += additionalInterest;
                currentBalance = newBalance;
            }
        }

        // Calculate current value (balance + liquidations already effective by target date)
        const totalLiquidated = getLiquidatedAmountUpTo(memory, targetDate);
        const currentValueGross = currentBalance + totalLiquidated;

        // Display values
        document.getElementById('mem-total-interest').innerText = formatCurrency(totalInterestAccrued);
        document.getElementById('mem-current-value').innerText = formatCurrency(currentValueGross);
        document.getElementById('mem-current-balance').innerText = formatCurrency(currentBalance);
        document.getElementById('mem-total-liquidated').innerText = formatCurrency(totalLiquidated);

        // Display Cattle
        const hasCattleDataNow = parseInt(memory.initial_cattle_count || 0) > 0;

        if (hasCattleDataNow) {
            let totalSlaughtered = 0;
            for (let liq of memory.liquidations) {
                const liqDateParts = liq.date.split('-');
                const liqDateObj = new Date(Date.UTC(liqDateParts[0], liqDateParts[1] - 1, liqDateParts[2]));
                if (liqDateObj <= targetDate) {
                    // Prefer explicit quantity; fall back to backend-estimated head count
                    const head = parseInt(liq.quantity) || parseInt(liq.estimated_quantity) || 0;
                    totalSlaughtered += head;
                }
            }
            const remainingCattle = Math.max(0, memory.initial_cattle_count - totalSlaughtered);

            const initialEl = document.getElementById('mem-initial-cattle');
            if (initialEl) initialEl.innerText = memory.initial_cattle_count > 0 ? memory.initial_cattle_count : '-';

            let remainingHtml = '-';
            if (memory.initial_cattle_count > 0) {
                // If partnership is fully settled (balance ~ 0), show 0 (Liquidado)
                if ((currentBalance < 0.01 && memory.liquidations.length > 0) ||
                    (remainingCattle === 0 && totalSlaughtered > 0)) {
                    remainingHtml = `<span style="color: #10b981;">0 (Liquidado)</span>`;
                } else {
                    remainingHtml = remainingCattle;
                }
            }
            const remainingEl = document.getElementById('mem-remaining-cattle');
            if (remainingEl) remainingEl.innerHTML = remainingHtml;
        }
        
        // --- Use Weighted Rate from Backend ---
        // Backend calculates: weighted by liquidations if they exist, otherwise furthest lot rate
        let weightedRate = parseFloat(memory.weighted_rate || 0);

        if (currentBalance < 0.01 && memory.liquidations.length > 0) {
            // Parceria quitada: travar o tempo decorrido na data da quitação e calcular taxa efetiva real
            const dp = lastEventDate.split('-');
            const sDateObj = new Date(Date.UTC(dp[0], dp[1] - 1, dp[2]));
            const diffTimeSettled = sDateObj - startDate;
            const displayDaysSettled = Math.max(0, Math.ceil(diffTimeSettled / (1000 * 60 * 60 * 24)));
            const preciseMonths = displayDaysSettled / 30;
            const diffMonthsSettled = preciseMonths.toFixed(1);

            document.getElementById('mem-time-elapsed').innerHTML = `${diffMonthsSettled} meses <span style="font-size: 0.9rem; color: #10b981;">(Quitado em ${displayDaysSettled} dias)</span>`;

            let initialPrincipal = parseFloat(memory.total_initial_principal);
            if (preciseMonths > 0 && initialPrincipal > 0 && totalLiquidated > 0) {
                weightedRate = (Math.pow((totalLiquidated / initialPrincipal), (1 / preciseMonths)) - 1) * 100;
            }
        }

        document.getElementById('mem-weighted-rate').innerHTML = `${weightedRate.toFixed(2)}% <span style="font-size: 0.9rem; color: #64748b;">a.m.</span>`;
        // Show/Hide Total Receipt Button
        const btnTotalReceipt = document.getElementById('btnTotalReceipt');
        if (currentBalance < 0.01 && memory.liquidations.length > 0) {
            btnTotalReceipt.style.display = 'inline-flex';
        } else {
            btnTotalReceipt.style.display = 'none';
        }
    }

    function closeMemoryModal() {
        document.getElementById('memoryModal').style.display = 'none';
        // Clear debug
        const debug = document.getElementById('mem-debug-container');
        if (debug) debug.remove();
    }

    // Close modal when clicking outside
    window.onclick = function (event) {
        const modal = document.getElementById('memoryModal');
        if (event.target == modal) {
            closeMemoryModal();
        }
    }

    function formatCurrency(value) {
        return parseFloat(value).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function getLiquidatedAmountUpTo(memory, targetDate) {
        if (!memory.liquidations) return 0;

        return memory.liquidations.reduce((total, liq) => {
            const parts = liq.date.split('-');
            const liqDate = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2]));
            return liqDate <= targetDate ? total + parseFloat(liq.amount_total || 0) : total;
        }, 0);
    }

    function printMemory() {
        window.print();
    }

    function exportMemoryXLS() {
        const memory = partnershipMemories[currentMemoryId];
        if (!memory) return;

        const dateInput = document.getElementById('calculationDate').value;
        const targetDateStr = dateInput;

        const dParts = targetDateStr.split('-');
        const targetDate = new Date(Date.UTC(dParts[0], dParts[1] - 1, dParts[2]));

        const startParts = memory.start_date.split('-');
        const startDate = new Date(Date.UTC(startParts[0], startParts[1] - 1, startParts[2]));

        const diffTime = targetDate - startDate;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        const displayDays = diffDays > 0 ? diffDays : 0;
        const diffMonths = (displayDays / 30).toFixed(1);

        // --- Event-Based Rolling Calculation (same as display) ---
        const events = memory.events || [];

        let currentBalance = parseFloat(memory.total_initial_principal);
        let totalInterestAccrued = 0;
        let lastEventDate = memory.start_date;

        for (let event of events) {
            const eventDateParts = event.date.split('-');
            const eventDate = new Date(Date.UTC(eventDateParts[0], eventDateParts[1] - 1, eventDateParts[2]));

            if (eventDate > targetDate) break;

            totalInterestAccrued += parseFloat(event.interest_accrued || 0);
            currentBalance = parseFloat(event.balance_after);
            lastEventDate = event.date;
        }

        // Additional accrual if needed
        const lastParts = lastEventDate.split('-');
        const lastDate = new Date(Date.UTC(lastParts[0], lastParts[1] - 1, lastParts[2]));

        if (targetDate > lastDate) {
            const additionalDays = Math.ceil((targetDate - lastDate) / (1000 * 60 * 60 * 24));

            if (additionalDays > 0) {
                let currentRate = 0;
                let totalInitialWeighted = 0;
                let totalInitialPrincipalActive = 0;
                let activeLots = [];

                for (let l of memory.lots) {
                    if (l.slaughter_date) {
                        const sParts = l.slaughter_date.split('-');
                        const sDate = new Date(Date.UTC(sParts[0], sParts[1] - 1, sParts[2]));
                        if (sDate >= targetDate) {
                            activeLots.push(l);
                        }
                    }
                }

                if (activeLots.length === 0) {
                    let sortedLots = [...memory.lots];
                    sortedLots.sort((a, b) => new Date(a.slaughter_date) - new Date(b.slaughter_date));
                    if (sortedLots.length > 0) {
                        currentRate = parseFloat(sortedLots[sortedLots.length - 1].rate);
                    }
                } else {
                    for (let l of activeLots) {
                        const rate = parseFloat(l.rate);
                        const initialPrincipal = parseFloat(l.original_principal || 0);
                        if (initialPrincipal > 0) {
                            totalInitialPrincipalActive += initialPrincipal;
                            totalInitialWeighted += (initialPrincipal * rate);
                        }
                    }
                    if (totalInitialPrincipalActive > 0) {
                        currentRate = totalInitialWeighted / totalInitialPrincipalActive;
                    } else {
                        currentRate = parseFloat(activeLots[0].rate);
                    }
                }

                const additionalMonths = additionalDays / 30;
                const factor = Math.pow((1 + currentRate / 100), additionalMonths);
                const newBalance = currentBalance * factor;
                totalInterestAccrued += (newBalance - currentBalance);
                currentBalance = newBalance;
            }
        }

        const totalLiquidated = getLiquidatedAmountUpTo(memory, targetDate);
        const currentValueGross = currentBalance + totalLiquidated;

        // Use Weighted Rate from Backend
        let weightedRate = parseFloat(memory.weighted_rate || 0);
        let displayMonths = diffMonths;
        let finalDisplayDays = displayDays;

        if (currentBalance < 0.01 && memory.liquidations.length > 0) {
            const dp = lastEventDate.split('-');
            const sDateObj = new Date(Date.UTC(dp[0], dp[1] - 1, dp[2]));
            const diffTimeSettled = sDateObj - startDate;
            finalDisplayDays = Math.max(0, Math.ceil(diffTimeSettled / (1000 * 60 * 60 * 24)));
            const preciseMonths = finalDisplayDays / 30;
            displayMonths = preciseMonths.toFixed(1);

            let initialPrincipal = parseFloat(memory.total_initial_principal);
            let totalPaid = totalLiquidated;
            
            if (preciseMonths > 0 && initialPrincipal > 0) {
                const effectiveRate = Math.pow((totalPaid / initialPrincipal), (1 / preciseMonths)) - 1;
                weightedRate = effectiveRate * 100;
            }
        }

        // Cattle / Lot info for XLS export
        const xlsHasCattleData = parseInt(memory.initial_cattle_count || 0) > 0;
        const xlsSummarizedLiquidations = getSummarizedLiquidations(memory.liquidations || []);
        const xlsHasQuantityLiquidations = xlsSummarizedLiquidations
            ? xlsSummarizedLiquidations.some(liq => liq.quantity || parseInt(liq.estimated_quantity) > 0)
            : false;
        const xlsHasLotInLiquidations = xlsSummarizedLiquidations
            ? xlsSummarizedLiquidations.some(liq => liq.lot_number)
            : false;
        // Keep legacy variable name used downstream in template literal
        const hasQuantityLiquidations = xlsHasQuantityLiquidations;
        let xlsTotalSlaughtered = 0;
        if (xlsHasCattleData && memory.liquidations) {
            for (let liq of memory.liquidations) {
                const lp = liq.date.split('-');
                const ld = new Date(Date.UTC(lp[0], lp[1] - 1, lp[2]));
                if (ld <= targetDate) {
                    const head = parseInt(liq.quantity) || parseInt(liq.estimated_quantity) || 0;
                    xlsTotalSlaughtered += head;
                }
            }
        }
        const xlsRemainingCattle = xlsHasCattleData
            ? Math.max(0, memory.initial_cattle_count - xlsTotalSlaughtered)
            : 0;

        let html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head>
                <meta charset="UTF-8">
                <!--[if gte mso 9]>
                <xml>
                    <x:ExcelWorkbook>
                        <x:ExcelWorksheets>
                            <x:ExcelWorksheet>
                                <x:Name>Memória de Cálculo</x:Name>
                                <x:WorksheetOptions>
                                    <x:DisplayGridlines/>
                                </x:WorksheetOptions>
                            </x:ExcelWorksheet>
                        </x:ExcelWorksheets>
                    </x:ExcelWorkbook>
                </xml>
                <![endif]-->
                <style>
                    table { border-collapse: collapse; width: 100%; }
                    th, td { border: 1px solid #000; padding: 5px; }
                    .header { background-color: #f0f0f0; font-weight: bold; }
                </style>
            </head>
            <body>
                <h2>Memória de Cálculo - Parceria #${memory.partnership_id}</h2>
                <p>Proprietário: ${memory.owner_name}</p>
                <p>Investidor: ${memory.investor_name}</p>
                <p>Data Início: ${startDate.toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</p>
                <p>Data de Cálculo: ${targetDate.toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</p>
                <br>
                
                <h3>Demonstrativo Consolidado</h3>
                <table>
                    <tr><td>Tempo de Engorda Decorrido</td><td>${displayMonths} meses (${finalDisplayDays} dias)</td></tr>
                    <tr><td>Taxa de Engorda Média (Efetiva)</td><td>${weightedRate.toFixed(2)}% a.m.</td></tr>
                    ${xlsHasCattleData ? `
                    <tr><td>Total de Cabeças</td><td>${memory.initial_cattle_count}</td></tr>
                    <tr><td>Saldo Atual de Cabeças</td><td>${xlsRemainingCattle}${xlsRemainingCattle === 0 && memory.initial_cattle_count > 0 ? ' (Liquidado)' : ''}</td></tr>
                    ` : ''}
                </table>
                <br>

                <table>
                    <tr><td>Principal Inicial Total</td><td>${formatCurrency(memory.total_initial_principal)}</td></tr>
                    <tr><td>(+) Valor de Engorda/Valorização Acumulada</td><td>${formatCurrency(totalInterestAccrued)}</td></tr>
                    <tr style="font-weight: bold;"><td>(=) Valor Bruto Atual</td><td>${formatCurrency(currentValueGross)}</td></tr>
                    <tr><td>(-) Total Abatido (Principal + Acumulado)</td><td>${formatCurrency(totalLiquidated)}</td></tr>
                    <tr style="font-weight: bold;"><td>(=) Saldo Atual (Ativos)</td><td>${formatCurrency(currentBalance)}</td></tr>
                </table>
                <br>
        `;

        if (xlsSummarizedLiquidations.length > 0) {
            html += `
                <h3>Histórico de Liquidações</h3>
                <table>
                    <thead>
                        <tr class="header">
                            <th>Data</th>
                            <th>Tempo</th>
                            <th>Lote</th>
                            <th>Cab.</th>
                            <th>Taxa</th>
                            <th>Principal</th>
                            <th>Valor da Engorda</th>
                            <th>Total</th>
                            <th>Saldo Após</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let effectiveRateContract = null;
            let hasSettlementLiq = false;
            let lastEventDateGlobal = memory.start_date;
            if (memory.events && memory.events.length > 0) {
                for (let event of memory.events) {
                    if (event.balance_after < 0.01) {
                        hasSettlementLiq = true;
                        lastEventDateGlobal = event.date;
                        break;
                    }
                }
            }

            if (hasSettlementLiq && xlsSummarizedLiquidations.length > 0) {
                let initialPrincipal = parseFloat(memory.total_initial_principal);
                let totalPaid = totalLiquidated;
                
                const dp = lastEventDateGlobal.split('-');
                const sDateObj = new Date(Date.UTC(dp[0], dp[1] - 1, dp[2]));
                const sp = memory.start_date.split('-');
                const startObj = new Date(Date.UTC(sp[0], sp[1] - 1, sp[2]));
                
                const diffTimeSettled = sDateObj - startObj;
                const displayDaysSettled = Math.max(0, Math.ceil(diffTimeSettled / (1000 * 60 * 60 * 24)));
                const preciseMonths = displayDaysSettled / 30;
                
                if (preciseMonths > 0 && initialPrincipal > 0) {
                    effectiveRateContract = (Math.pow((totalPaid / initialPrincipal), (1 / preciseMonths)) - 1) * 100;
                }
            }

            let lastLiqDateStr = memory.start_date;
            xlsSummarizedLiquidations.forEach(liq => {
                const lp = liq.date.split('-');
                const ld = new Date(Date.UTC(lp[0], lp[1] - 1, lp[2]));

                const lastParts = lastLiqDateStr.split('-');
                const lastDate = new Date(Date.UTC(lastParts[0], lastParts[1] - 1, lastParts[2]));
                const diffDays = Math.ceil((ld - lastDate) / (1000 * 60 * 60 * 24));
                const elapsedMonths = (diffDays / 30).toFixed(1);
                const displayElapsed = `${elapsedMonths}m (${diffDays}d)`;

                let displayRate = effectiveRateContract !== null ? effectiveRateContract : parseFloat(liq.rate);
                let displayLot = formatLotDisplay(liq.lot_number);
                let displayQuantity = '-';
                if (liq.quantity) {
                    displayQuantity = liq.quantity_display || liq.quantity;
                } else if (parseInt(liq.estimated_quantity) > 0) {
                    displayQuantity = liq.quantity_display || `~${parseInt(liq.estimated_quantity)}`;
                }

                html += `
                    <tr>
                        <td>${ld.toLocaleDateString('pt-BR', { timeZone: 'UTC' })}</td>
                        <td style="text-align: center;">${displayElapsed}</td>
                        <td style="text-align: center;">${displayLot}</td>
                        <td style="text-align: center;">${displayQuantity}</td>
                        <td>${displayRate.toFixed(2)}%</td>
                        <td>${formatCurrency(liq.amount_principal)}</td>
                        <td>${formatCurrency(liq.amount_interest)}</td>
                        <td>${formatCurrency(liq.amount_total)}</td>
                        <td>${formatCurrency(liq.balance_after || 0)}</td>
                    </tr>
                `;
                lastLiqDateStr = liq.date;
            });
            html += `</tbody></table>`;
        }

        html += `</body></html>`;

        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `memoria_calculo_parceria_${memory.partnership_id}.xls`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function generateReceipt(liquidation, memory) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'generate_receipt.php';
        form.target = '_blank'; // Open in new tab

        const params = {
            investor: memory.investor_name,
            investor_cpf: memory.investor_cpf,
            owner: memory.owner_name,
            owner_cpf: memory.owner_cpf,
            date: liquidation.date,
            amount: formatCurrency(liquidation.amount_total).replace('R$', '').trim(),
            partnership_id: memory.partnership_id,
            partnership_start_date: memory.start_date
        };

        for (const key in params) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = params[key];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    }

    function generateTotalReceipt() {
        const memory = partnershipMemories[currentMemoryId];
        if (!memory) return;

        const liquidations = memory.liquidations.map(liq => ({
            date: liq.date,
            amount: liq.amount_total
        }));

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = 'generate_total_receipt.php';
        form.target = '_blank';

        const params = {
            investor: memory.investor_name,
            investor_cpf: memory.investor_cpf,
            owner: memory.owner_name,
            owner_cpf: memory.owner_cpf,
            partnership_id: memory.partnership_id,
            partnership_start_date: memory.start_date,
            liquidations: JSON.stringify(liquidations)
        };

        for (const key in params) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = params[key];
            form.appendChild(input);
        }

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
    }
