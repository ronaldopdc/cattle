<script>
    if (typeof formatCurrency !== 'function') {
        function formatCurrency(value) {
            return parseFloat(value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
    }

    function escapeUpcomingSlaughterHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, function (char) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
        });
    }

    function formatUpcomingSlaughterNumber(value) {
        return parseFloat(value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function populateUpcomingSlaughterReportPartners() {
        const ownerSelect = document.getElementById('upcomingReportOwner');
        const investorSelect = document.getElementById('upcomingReportInvestor');
        if (ownerSelect.dataset.loaded === '1' && (!investorSelect || investorSelect.dataset.loaded === '1')) return;

        const owners = {};
        const investors = {};
        tblUpcomingSlaughterReportData.forEach(row => {
            if (row.owner_id) owners[row.owner_id] = row.owner_name;
            if (investorSelect && row.investor_id) investors[row.investor_id] = row.investor_name;
        });

        Object.entries(owners).sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
            ownerSelect.insertAdjacentHTML('beforeend', `<option value="${escapeUpcomingSlaughterHtml(id)}">${escapeUpcomingSlaughterHtml(name)}</option>`);
        });
        if (investorSelect) {
            Object.entries(investors).sort((a, b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
                investorSelect.insertAdjacentHTML('beforeend', `<option value="${escapeUpcomingSlaughterHtml(id)}">${escapeUpcomingSlaughterHtml(name)}</option>`);
            });
            investorSelect.dataset.loaded = '1';
        }

        ownerSelect.dataset.loaded = '1';
    }

    function openUpcomingSlaughterReportModal() {
        populateUpcomingSlaughterReportPartners();
        document.getElementById('upcomingReportDateStart').value = document.getElementById('dashDateStart').value;
        document.getElementById('upcomingReportDateEnd').value = document.getElementById('dashDateEnd').value;
        renderUpcomingSlaughterReportTable();
        document.getElementById('upcomingSlaughterReportModal').style.display = 'block';
    }

    function closeUpcomingSlaughterReportModal() {
        document.getElementById('upcomingSlaughterReportModal').style.display = 'none';
    }

    function getFilteredUpcomingSlaughterReportData() {
        const dStart = document.getElementById('upcomingReportDateStart').value;
        const dEnd = document.getElementById('upcomingReportDateEnd').value;
        const ownerId = document.getElementById('upcomingReportOwner').value;
        const investorSelect = document.getElementById('upcomingReportInvestor');
        const investorId = investorSelect ? investorSelect.value : 'all';

        return tblUpcomingSlaughterReportData.filter(row => {
            if (dStart && row.date < dStart) return false;
            if (dEnd && row.date > dEnd) return false;
            if (ownerId !== 'all' && String(row.owner_id) !== ownerId) return false;
            if (investorId !== 'all' && String(row.investor_id) !== investorId) return false;
            return true;
        });
    }

    function renderUpcomingSlaughterReportTable() {
        const tbody = document.getElementById('upcomingSlaughterReportTableBody');
        const rows = getFilteredUpcomingSlaughterReportData();
        let html = '';
        let totalBalance = 0;
        let totalQuantity = 0;

        if (rows.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="padding: 2rem; text-align: center; color: #64748b;">Nenhum abate ainda n&atilde;o liquidado encontrado para os filtros informados.</td></tr>`;
            return;
        }

        rows.forEach(row => {
            const balance = parseFloat(row.current_balance || 0);
            const quantity = parseInt(row.quantity || 0, 10);
            totalBalance += balance;
            totalQuantity += quantity;

            html += `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                    <td style="padding: 10px; color: #e2e8f0;">${escapeUpcomingSlaughterHtml(row.formatted_date)}</td>
                    <td style="padding: 10px; color: #94a3b8;">#${escapeUpcomingSlaughterHtml(row.partnership_id)}</td>
                    <td style="padding: 10px; color: #94a3b8;">${escapeUpcomingSlaughterHtml(row.lot_numbers || '-')}</td>
                    <td style="padding: 10px; color: #e2e8f0;">${escapeUpcomingSlaughterHtml(row.owner_name)}</td>
                    <td style="padding: 10px; color: #e2e8f0;">${escapeUpcomingSlaughterHtml(row.investor_name)}</td>
                    <td style="padding: 10px; text-align: right; color: #fbbf24; font-weight: 600;">${formatCurrency(balance)}</td>
                    <td style="padding: 10px; text-align: right; color: #818cf8;">${quantity > 0 ? quantity : '-'}</td>
                </tr>
            `;
        });

        html += `
            <tr style="border-top: 2px solid rgba(255,255,255,0.1); background: rgba(251, 191, 36, 0.05); font-size: 1rem; font-weight: 700;">
                <td colspan="5" style="padding: 15px; color: #fbbf24; text-align: right;">TOTAL:</td>
                <td style="padding: 15px; text-align: right; color: #fbbf24;">${formatCurrency(totalBalance)}</td>
                <td style="padding: 15px; text-align: right; color: #818cf8;">${totalQuantity > 0 ? totalQuantity : '-'}</td>
            </tr>
        `;

        tbody.innerHTML = html;
    }

    function buildUpcomingSlaughterReportExportTable() {
        const rows = getFilteredUpcomingSlaughterReportData();
        const dStart = document.getElementById('upcomingReportDateStart').value;
        const dEnd = document.getElementById('upcomingReportDateEnd').value;
        const ownerText = document.getElementById('upcomingReportOwner').selectedOptions[0].text;
        const investorSelect = document.getElementById('upcomingReportInvestor');
        const investorText = investorSelect ? investorSelect.selectedOptions[0].text : 'Todos';
        const logoUrl = new URL('assets/logo.png', window.location.href).href;
        let totalBalance = 0;
        let totalQuantity = 0;

        let html = `
            <div class="report-header">
                <img src="${logoUrl}" alt="Cattle Invest" class="report-logo">
                <div>
                    <h2>Relat&oacute;rio de Abates a Liquidar</h2>
                    <p>Abates ainda n&atilde;o liquidados</p>
                    <p>Per&iacute;odo: ${(dStart || '').split('-').reverse().join('/')} a ${(dEnd || '').split('-').reverse().join('/')}</p>
                    <p>Propriet&aacute;rio: ${escapeUpcomingSlaughterHtml(ownerText)} | Investidor: ${escapeUpcomingSlaughterHtml(investorText)}</p>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Contrato</th>
                        <th>Lote</th>
                        <th>Propriet&aacute;rio</th>
                        <th>Investidor</th>
                        <th>Valor Atual (R$)</th>
                        <th>Qtd Restante</th>
                    </tr>
                </thead>
                <tbody>
        `;

        rows.forEach(row => {
            const balance = parseFloat(row.current_balance || 0);
            const quantity = parseInt(row.quantity || 0, 10);
            totalBalance += balance;
            totalQuantity += quantity;

            html += `
                <tr>
                    <td>${escapeUpcomingSlaughterHtml(row.formatted_date)}</td>
                    <td>#${escapeUpcomingSlaughterHtml(row.partnership_id)}</td>
                    <td>${escapeUpcomingSlaughterHtml(row.lot_numbers || '-')}</td>
                    <td>${escapeUpcomingSlaughterHtml(row.owner_name)}</td>
                    <td>${escapeUpcomingSlaughterHtml(row.investor_name)}</td>
                    <td class="number">${formatUpcomingSlaughterNumber(balance)}</td>
                    <td class="number">${quantity > 0 ? quantity : '-'}</td>
                </tr>
            `;
        });

        html += `
                <tr class="total">
                    <td colspan="5">TOTAL</td>
                    <td class="number">${formatUpcomingSlaughterNumber(totalBalance)}</td>
                    <td class="number">${totalQuantity > 0 ? totalQuantity : '-'}</td>
                </tr>
            </tbody></table>
        `;

        return html;
    }

    function exportUpcomingSlaughterReportPDF() {
        const content = buildUpcomingSlaughterReportExportTable();
        const win = window.open('', '_blank');
        win.document.write(`
            <html>
                <head>
                    <title>Relat&oacute;rio de Abates a Liquidar</title>
                    <style>
                        body { font-family: Arial, sans-serif; color: #111827; }
                        .report-header { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
                        .report-logo { height: 58px; width: auto; }
                        .report-header h2 { margin: 0 0 8px; }
                        .report-header p { margin: 2px 0; }
                        table { border-collapse: collapse; width: 100%; font-size: 12px; }
                        th, td { border: 1px solid #d1d5db; padding: 6px; }
                        th { background: #f3f4f6; }
                        .number { text-align: right; }
                        .total { background: #fffbeb; font-weight: bold; }
                    </style>
                </head>
                <body>${content}</body>
            </html>
        `);
        win.document.close();
        win.focus();
        win.print();
    }

    function exportUpcomingSlaughterReportXLS() {
        const html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
                <head>
                    <meta charset="UTF-8">
                    <style>
                        table { border-collapse: collapse; width: 100%; }
                        .report-header { margin-bottom: 18px; }
                        .report-logo { height: 58px; width: auto; }
                        th, td { border: 1px solid #000; padding: 5px; }
                        th { background-color: #f0f0f0; font-weight: bold; }
                        .number { text-align: right; }
                        .total { background-color: #e2e8f0; font-weight: bold; text-align: right; }
                    </style>
                </head>
                <body>${buildUpcomingSlaughterReportExportTable()}</body>
            </html>
        `;

        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'relatorio_proximos_abates.xls';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
